# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"        # e.g. for architecture discussion, code review
  - "GitHub Copilot"  # e.g. for autocomplete
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  Used Claude to draft, debug, and refactor the ranking pipeline (scoring
  modules, TF-IDF semantic matcher, honeypot/title filters, reasoning
  generator) and to review the code for correctness against the JD. All
  design decisions (signal weights, filters, output format) were reviewed
  and approved by the team. No candidate data was sent to any external
  LLM API — ranking itself runs offline with scikit-learn only.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Eight-signal weighted ranker for a Senior AI Engineer JD (embeddings,
  retrieval, ranking, production LLM/RAG work). Semantic match (30%) uses
  TF-IDF + cosine similarity over profile/skills/career text — no network
  calls, no model download, scores 100K candidates in under a minute on
  CPU. Career relevance (20%) is the key differentiator: it parses each
  job description for duration-weighted, ownership-language-scored
  evidence of real retrieval/ranking work (led/built > contributed to >
  familiar with), so a candidate who only lists "RAG, Pinecone" as a skill
  tag without matching career-history evidence scores near zero on this
  signal. Remaining signals cover company quality (product vs. services),
  experience-curve fit, skill-proficiency match, recency-gated behavioral
  availability, location, and platform assessment scores. Hard filters
  remove off-domain titles and honeypot profiles (inconsistent experience,
  implausibly perfect signals). Every row's reasoning string is built only
  from fields present on that candidate — no hallucinated justifications.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: false        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
